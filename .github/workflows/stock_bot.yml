name: Stock Monitor Bot

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード (intraday=場中アラート / daily=夜間レポート / none=通知なし)'
        required: false
        default: 'none'
        type: choice
        options:
          - none
          - intraday
          - daily

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock monitor
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_ALERT_WEBHOOK_URL: ${{ secrets.SLACK_ALERT_WEBHOOK_URL }}
        run: |
          MODE="${{ inputs.mode }}"
          if [ "$MODE" = "none" ] || [ -z "$MODE" ]; then
            python monitor.py
          else
            python monitor.py --mode "$MODE"
          fi

      - name: Commit and push updated data.db
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.db
          git add alert_state.json 2>/dev/null || true
          # 変更がない場合はコミットしない
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update stock data $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
